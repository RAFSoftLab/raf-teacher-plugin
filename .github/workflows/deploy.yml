name: Deploy Plugin

on:
  workflow_run:
    workflows: ["Bump Plugin Version"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      PRODUCTION_SERVER_USERNAME: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
      PRODUCTION_SERVER_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
      REMOTE_TARGET: "/var/www/intellij-plugins/"

    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create config.properties
        run: |
          mkdir -p src/main/resources
          echo "api.url=${{ secrets.API_URL }}" > src/main/resources/config.properties
          echo "api.token=${{ secrets.API_TOKEN }}" >> src/main/resources/config.properties

      - name: Build plugin
        run: |
          chmod +x gradlew
          ./gradlew buildPlugin --no-configuration-cache

      # KORAK 4: SCP - Šaljemo direktno u finalni folder
      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ env.PRODUCTION_SERVER_HOST }}
          username: ${{ env.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/distributions/nastavnicki-plugin-*.zip"
          target: "/var/www/intellij-plugins/build/distributions/"
          strip_components: 2 # Briše 'build/distributions/' iz izvorne putanje
          overwrite: true

      # KORAK 5: SSH - Ažuriranje XML-a
      - name: Update updatePlugins.xml
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            BASE_DIR="/var/www/intellij-plugins"
            DIST_DIR="$BASE_DIR/build/distributions"
            XML_PATH="$BASE_DIR/updatePlugins.xml"
            
            # Pronalaženje najnovijeg ZIP-a (logičko sortiranje po verziji)
            LATEST_ZIP=$(ls -v $DIST_DIR/nastavnicki-plugin-*.zip 2>/dev/null | tail -n 1)
            
            if [ -z "$LATEST_ZIP" ]; then
              echo "GRESKA: Nije pronađen ZIP u $DIST_DIR"
              exit 1
            fi
            
            FILENAME=$(basename "$LATEST_ZIP")
            VERSION=$(echo "$FILENAME" | sed -E 's/nastavnicki-plugin-(.*)\.zip/\1/')
            PLUGIN_URL="http://157.180.37.247/build/distributions/$FILENAME"
            
            echo "Detektovan fajl: $FILENAME (Verzija: $VERSION)"

            # Provera duplikata
            if [ -f "$XML_PATH" ] && grep -q "version=\"$VERSION\"" "$XML_PATH"; then
              echo "Verzija $VERSION već postoji u XML-u."
              exit 0
            fi

            if [ ! -f "$XML_PATH" ]; then
               echo '<?xml version="1.0" encoding="UTF-8"?><plugins></plugins>' > "$XML_PATH"
            fi

            # In-place edit sa xmlstarlet
            xmlstarlet ed -L \
              --subnode "/plugins" --type elem -n "plugin" -v "" \
              --var "L" "/plugins/plugin[last()]" \
              --insert "\$L" --type attr -n "id" -v "com.raf.nastavnicki" \
              --insert "\$L" --type attr -n "url" -v "$PLUGIN_URL" \
              --insert "\$L" --type attr -n "version" -v "$VERSION" \
              --subnode "\$L" --type elem -n "name" -v "Nastavnički Plugin - RAF" \
              --subnode "\$L" --type elem -n "description" -v "Plugin za nastavnike u IntelliJ-u" \
              --subnode "\$L" --type elem -n "idea-version" \
              --insert "\$L/idea-version" --type attr -n "since-build" -v "233" \
              --insert "\$L/idea-version" --type attr -n "until-build" -v "999.*" \
              --subnode "\$L" --type elem -n "vendor" \
              --insert "\$L/vendor" --type attr -n "email" -v "zarkoned@outlook.com" \
              --insert "\$L/vendor" --type attr -n "url" -v "https://raf.edu.rs" \
              --subnode "\$L" --type elem -n "icon" \
              --insert "\$L/icon" --type attr -n "url" -v "http://157.180.37.247/pluginIcon.svg" \
              "$XML_PATH"
            
            echo "Nastavnički XML ažuriran na $VERSION."