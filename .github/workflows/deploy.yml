name: Deploy Plugin

on:
  workflow_run:
    workflows: ["Bump Plugin Version"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PRODUCTION_SERVER_USERNAME: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
      PRODUCTION_SERVER_PASSWORD: ${{ secrets.PRODUCTION_SERVER_PASSWORD }}
      PRODUCTION_SERVER_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
      # Putanja na serveru gde želiš fajlove
      REMOTE_TARGET: "/var/www/intellij-plugins/"

    steps:
      - uses: actions/checkout@v3

      - name: Create config.properties
        run: |
          mkdir -p src/main/resources
          echo "api.url=${{ secrets.API_URL }}" > src/main/resources/config.properties
          echo "api.token=${{ secrets.API_TOKEN }}" >> src/main/resources/config.properties

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ env.PRODUCTION_SERVER_HOST }}
          username: ${{ env.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/distributions/*.zip"
          target: ${{ env.REMOTE_TARGET }}
          # Ostavljamo strip_components isključen (default: 0)
          # da bi na serveru napravio build/distributions/ strukturu

      - name: Update updatePlugins.xml
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Putanje na serveru
            BASE_DIR="${{ env.REMOTE_TARGET }}"
            DIST_DIR="$BASE_DIR/build/distributions"
            XML_PATH="$BASE_DIR/updatePlugins.xml"
            
            # 2. Pronalaženje ZIP-a (Paziti na raf-teacher-plugin prefix iz logova)
            LATEST_ZIP=$(ls -t $DIST_DIR/raf-teacher-plugin-*.zip 2>/dev/null | head -n 1)
            
            if [ -z "$LATEST_ZIP" ]; then
              echo "GRESKA: ZIP fajl nije pronadjen u $DIST_DIR"
              ls -R $BASE_DIR # Ispisujemo strukturu radi debugginga u GitHub logu
              exit 1
            fi
            
            FILENAME=$(basename "$LATEST_ZIP")
            
            # 3. Ekstrakcija verzije (npr. iz raf-teacher-plugin-2.2.22.zip izvlači 2.2.22)
            VERSION=$(echo "$FILENAME" | sed -E 's/raf-teacher-plugin-(.*)\.zip/\1/')
            
            # 4. URL za IntelliJ (mora sadržati celu putanju do fajla)
            PLUGIN_URL="http://157.180.37.247/build/distributions/$FILENAME"
            
            echo "Ažuriram na verziju: $VERSION"
            echo "URL fajla: $PLUGIN_URL"

            # 5. Inicijalizacija XML-a ako ne postoji
            if [ ! -f "$XML_PATH" ]; then
               echo '<?xml version="1.0" encoding="UTF-8"?><plugins></plugins>' > "$XML_PATH"
            fi

            # 6. Ažuriranje XML-a pomoću xmlstarlet
            TEMP_XML="/tmp/updatePlugins_temp.xml"
            
            xmlstarlet ed \
              --subnode "/plugins" --type elem -n "plugin" -v "" \
              --insert "/plugins/plugin[last()]" --type attr -n "id" -v "com.raf.nastavnicki" \
              --insert "/plugins/plugin[last()]" --type attr -n "url" -v "$PLUGIN_URL" \
              --insert "/plugins/plugin[last()]" --type attr -n "version" -v "$VERSION" \
              --subnode "/plugins/plugin[last()]" --type elem -n "name" -v "Nastavnički Plugin - RAF" \
              --subnode "/plugins/plugin[last()]" --type elem -n "description" -v "Plugin za nastavnike u IntelliJ-u" \
              --subnode "/plugins/plugin[last()]" --type elem -n "idea-version" \
              --insert "/plugins/plugin[last()]/idea-version" --type attr -n "since-build" -v "233" \
              --insert "/plugins/plugin[last()]/idea-version" --type attr -n "until-build" -v "999.*" \
              --subnode "/plugins/plugin[last()]" --type elem -n "vendor" \
              --insert "/plugins/plugin[last()]/vendor" --type attr -n "email" -v "zarkoned@outlook.com" \
              --insert "/plugins/plugin[last()]/vendor" --type attr -n "url" -v "https://raf.edu.rs" \
              --subnode "/plugins/plugin[last()]" --type elem -n "icon" \
              --insert "/plugins/plugin[last()]/icon" --type attr -n "url" -v "http://157.180.37.247/pluginIcon.svg" \
              "$XML_PATH" > "$TEMP_XML"
            
            mv "$TEMP_XML" "$XML_PATH"
            echo "XML uspešno ažuriran na putanji $XML_PATH"